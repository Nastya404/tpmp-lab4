name: Tests and Coverage

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake lcov libsqlite3-dev g++

      - name: Configure with CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="--coverage -g -O0" \
            -DCMAKE_CXX_FLAGS="--coverage -g -O0" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        run: cd build && ./tests/runTests

      - name: Collect coverage data
        run: |
          lcov --capture \
               --directory build \
               --output-file coverage.info \
               --ignore-errors inconsistent,unsupported,format,mismatch \
               --rc lcov_branch_coverage=1

          lcov --remove coverage.info \
               '/usr/*' \
               '*/googletest/*' \
               '*/tests/*' \
               '*/_deps/*' \
               --output-file coverage_filtered.info \
               --ignore-errors inconsistent,unsupported,format,unused,mismatch \
               --rc lcov_branch_coverage=1

      - name: Generate HTML coverage report
        run: |
          mkdir -p docs/coverage
          genhtml coverage_filtered.info \
                  --output-directory docs/coverage \
                  --title "Автопарк — Coverage Report" \
                  --show-details \
                  --branch-coverage \
                  --rc lcov_branch_coverage=1 \
                  --ignore-errors inconsistent,unsupported,format,unused

      - name: Generate coverage-summary.json
        run: |
          LINES=$(lcov --summary coverage_filtered.info 2>&1 \
                  | grep "lines" | grep -oP '\d+\.\d+' | head -1)
          FUNCS=$(lcov --summary coverage_filtered.info 2>&1 \
                  | grep "functions" | grep -oP '\d+\.\d+' | head -1)
          BRANCHES=$(lcov --summary coverage_filtered.info 2>&1 \
                  | grep "branches" | grep -oP '\d+\.\d+' | head -1)
          LINES=${LINES:-0}
          FUNCS=${FUNCS:-0}
          BRANCHES=${BRANCHES:-0}
          cat > docs/coverage/coverage-summary.json <<EOF
          {
            "total": {
              "lines":     { "pct": $LINES },
              "functions": { "pct": $FUNCS },
              "branches":  { "pct": $BRANCHES }
            },
            "generated": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage_filtered.info

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4