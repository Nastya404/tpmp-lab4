name: Tests and Coverage

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: sudo apt-get install -y cmake lcov libsqlite3-dev

    - name: Build
      run: |
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_C_FLAGS="--coverage" \
          -DCMAKE_CXX_FLAGS="--coverage" \
          -DCMAKE_EXE_LINKER_FLAGS="--coverage"
        make -j$(nproc)

    - name: Run tests
      run: cd build && ./tests/runTests

    - name: Generate coverage report
      run: |
        cd build
        lcov --capture --directory . --output-file coverage.info \
          --ignore-errors inconsistent,unsupported,format,mismatch
        lcov --remove coverage.info '/usr/*' '*/googletest/*' \
          '*/tests/*' '*/_deps/*' --output-file coverage_filtered.info \
          --ignore-errors inconsistent,unsupported,format,unused,mismatch
        genhtml coverage_filtered.info --output-directory coverage_report \
          --ignore-errors inconsistent,unsupported,format,unused

    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: build/coverage_report

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
